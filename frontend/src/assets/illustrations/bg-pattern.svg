<svg width="1600" height="1000" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="blobPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.16" />
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="blobPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.14" />
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0" />
    </radialGradient>
    <pattern id="dotGrid" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#A855F7" fill-opacity="0.10" />
    </pattern>
  </defs>

  <!-- soft ambient blobs, same language as the hero's blurred circles -->
  <circle cx="220" cy="160" r="320" fill="url(#blobPurple)" />
  <circle cx="1380" cy="220" r="260" fill="url(#blobPink)" />
  <circle cx="260" cy="820" r="280" fill="url(#blobPink)" />
  <circle cx="1340" cy="800" r="340" fill="url(#blobPurple)" />

  <!-- faint dot grid texture across the whole canvas -->
  <rect x="0" y="0" width="1600" height="1000" fill="url(#dotGrid)" />

  <!-- a few thin outline rings, echoing the small circle/dot accents used elsewhere -->
  <circle cx="120" cy="500" r="22" fill="none" stroke="#A855F7" stroke-opacity="0.14" stroke-width="2" />
  <circle cx="1500" cy="500" r="16" fill="none" stroke="#EC4899" stroke-opacity="0.14" stroke-width="2" />
  <circle cx="800" cy="120" r="10" fill="none" stroke="#A855F7" stroke-opacity="0.12" stroke-width="2" />
  <circle cx="780" cy="900" r="14" fill="none" stroke="#EC4899" stroke-opacity="0.12" stroke-width="2" />

  <!-- sparse dashed connector lines, matching the dashed paths in the hero -->
  <path d="M150 480 Q 400 380 650 460" fill="none" stroke="#A855F7" stroke-opacity="0.10" stroke-width="2" stroke-dasharray="6 8" />
  <path d="M950 150 Q 1150 250 1350 180" fill="none" stroke="#EC4899" stroke-opacity="0.10" stroke-width="2" stroke-dasharray="6 8" />
</svg>
